<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - SyncEvent</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="icon" href="../../assets/favicon.svg" type="image/x-icon">
</head>

<body class="bg-white">
  <main class="container-custom py-4 py-lg-0 min-vh-100 d-flex align-items-center">
    <div class="row w-100 g-5 align-items-stretch">

      <!-- 2. Left Column: Authentication Panel -->
      <div class="col-12 col-lg-6 d-flex flex-column justify-content-center mx-auto">
        <div class="w-100 mx-auto" style="max-width: 480px;">

          <!-- 2.1 Brand Area -->
          <div class="text-center mb-3">
            <a href="../../index.html" class="d-inline-block text-decoration-none transition-scale">
              <img src="../../assets/logo.SVG" alt="SyncEvent" height="42">
            </a>
          </div>

          <!-- 2.2 Page Heading Section -->
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold text-neutral-900 mb-2">Welcome Back</h1>
            <p class="text-neutral-500 mb-0">Login with OTP to access your account</p>
          </div>

          <!-- 2.3 Form Container -->
          <div id="login-form-container"></div>

          <!-- 2.6 Signup Redirect Text -->
          <div class="text-center mb-4 mt-2">
            <span class="text-neutral-400">Don’t have an account? <a href="signup.html"
                class="text-primary text-decoration-none fw-medium">Sign up</a></span>
          </div>

          <!-- 2.7 Divider Area -->
          <div class="d-flex align-items-center gap-3 mb-4">
            <div class="flex-grow-1 border-top border-neutral-100"></div>
            <span class="text-neutral-400 small">Or login with</span>
            <div class="flex-grow-1 border-top border-neutral-100"></div>
          </div>

          <!-- 2.8 Social Login Buttons -->
          <div class="row g-3 ">
            <div class="col">
              <button type="button" class="btn btn-outline-light border-neutral-100 w-100 text-neutral-900">
                <i data-lucide="facebook" width="20" height="20"></i>
              </button>
            </div>
            <div class="col">
              <button type="button" class="btn btn-outline-light border-neutral-100 w-100 text-neutral-900">
                <i data-lucide="chrome" width="20" height="20"></i>
              </button>
            </div>
            <div class="col">
              <button type="button" class="btn btn-outline-light border-neutral-100 w-100 text-neutral-900">
                <i data-lucide="apple" width="20" height="20"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 3. Right Column: Image Panel -->
      <div class="col-lg-6 d-none d-lg-block">
        <div class="rounded-4 overflow-hidden position-relative"
          style="position: sticky; top: 3rem; height: calc(100vh - 6rem);">
          <!-- Overlay & Gradient -->
          <div class="position-absolute inset-0 z-1"
            style="background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 100%); width: 100%; height: 100%;">
          </div>

          <!-- Brand Tagline -->
          <div class="position-absolute bottom-0 start-0 p-5 z-2">
            <h3 class="text-white fw-medium mb-0" style="text-shadow: 0 2px 4px rgba(0,0,0,0.3);">Discover events that
              move you.</h3>
          </div>

          <div id="loginCarousel" class="carousel slide h-100" data-bs-ride="carousel">
            <div class="carousel-indicators mb-4 z-2">
              <button type="button" data-bs-target="#loginCarousel" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
              <button type="button" data-bs-target="#loginCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#loginCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner h-100">
              <div class="carousel-item active h-100">
                <img src="../../assets/about_the_eif.jpg" class="d-block w-100 h-100 object-fit-cover"
                  alt="Login Visual 1">
              </div>
              <div class="carousel-item h-100">
                <img src="../../assets/about_the_eif.jpg" class="d-block w-100 h-100 object-fit-cover"
                  alt="Login Visual 2">
              </div>
              <div class="carousel-item h-100">
                <img src="../../assets/about_the_eif.jpg" class="d-block w-100 h-100 object-fit-cover"
                  alt="Login Visual 3">
              </div>
            </div>
            <button class="carousel-control-prev z-2" type="button" data-bs-target="#loginCarousel"
              data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next z-2" type="button" data-bs-target="#loginCarousel"
              data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>



  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../../scripts/app.js"></script>
</body>

</html>
